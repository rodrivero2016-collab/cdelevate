<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CDElevate | Elite Coaching</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #101010;
      --card: #161616;
      --border: rgba(255,255,255,0.07);
      --accent: #C6FF3E;
      --accent-dim: rgba(198,255,62,0.1);
      --orange: #FF5E1F;
      --blue: #3D9EFF;
      --purple: #B04DFF;
      --text: #FFFFFF;
      --text-muted: #888;
      --text-dim: #333;
      --danger: #FF3B3B;
      --success: #22C55E;
      --display: 'Bebas Neue', sans-serif;
      --body: 'DM Sans', sans-serif;
      --r: 14px;
      --r-sm: 8px;
      --nav: 68px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--body); font-size:15px; line-height:1.5; overflow-x:hidden; }
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:#222; border-radius:2px; }

    /* ── APP SHELL ── */
    #app { min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:var(--nav); position:relative; }
    @media(min-width:768px){ #app { max-width:900px; padding-bottom:0; padding-top:68px; } }

    /* ── ANIMATIONS ── */
    .screen { animation: fadeUp .28s cubic-bezier(.22,1,.36,1); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    /* ── TOP NAV (desktop) ── */
    .top-nav { display:none; position:fixed; top:0; left:0; right:0; height:68px; background:rgba(8,8,8,.96); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); z-index:100; align-items:center; justify-content:space-between; padding:0 40px; }
    .tn-logo { font-family:var(--display); font-size:30px; letter-spacing:2px; } .tn-logo em { color:var(--accent); font-style:normal; }
    .tn-links { display:flex; gap:4px; }
    .tn-link { padding:8px 16px; border-radius:var(--r-sm); font-size:14px; font-weight:500; cursor:pointer; color:var(--text-muted); transition:all .2s; }
    .tn-link:hover { color:var(--text); } .tn-link.active { color:var(--accent); background:var(--accent-dim); }
    @media(min-width:768px){ .top-nav { display:flex; } .bottom-nav { display:none !important; } }

    /* ── BOTTOM NAV (mobile) ── */
    .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; height:var(--nav); background:rgba(6,6,6,.97); backdrop-filter:blur(24px); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; z-index:100; }
    .bn-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 20px; cursor:pointer; color:var(--text-muted); font-size:11px; font-weight:500; transition:color .2s; position:relative; }
    .bn-item svg { width:22px; height:22px; } .bn-item.active { color:var(--accent); }
    .bn-badge { position:absolute; top:7px; right:10px; background:var(--orange); color:#000; font-size:10px; font-weight:800; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

    /* ── HEADER ── */
    .hdr { display:flex; align-items:center; justify-content:space-between; padding:18px 18px 10px; position:sticky; top:0; z-index:50; background:var(--bg); border-bottom:1px solid var(--border); }
    .hdr-title { font-family:var(--display); font-size:28px; letter-spacing:1px; }
    .hdr-back { display:flex; align-items:center; gap:5px; color:var(--accent); font-size:14px; font-weight:600; cursor:pointer; padding:6px 0; }

    /* ── BUTTONS ── */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:13px 22px; border-radius:var(--r-sm); font-family:var(--body); font-size:15px; font-weight:600; cursor:pointer; border:none; transition:all .18s; width:100%; }
    .btn-pri { background:var(--accent); color:#000; } .btn-pri:hover { filter:brightness(1.08); transform:translateY(-1px); }
    .btn-sec { background:var(--card); color:var(--text); border:1px solid var(--border); } .btn-sec:hover { background:#1e1e1e; }
    .btn-ghost { background:transparent; color:var(--accent); border:1px solid rgba(198,255,62,.3); } .btn-ghost:hover { background:var(--accent-dim); }
    .btn-danger { background:rgba(255,59,59,.1); color:var(--danger); border:1px solid rgba(255,59,59,.2); }
    .btn-sm { padding:8px 16px; font-size:13px; width:auto; }
    .btn-xs { padding:6px 12px; font-size:12px; width:auto; }

    /* ── CARDS ── */
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px; }
    .card-click { cursor:pointer; transition:all .18s; } .card-click:hover { background:#1c1c1c; border-color:rgba(255,255,255,.12); }

    /* ── FORM ── */
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .field label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); }
    .field input, .field textarea, .field select { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text); font-family:var(--body); font-size:15px; padding:12px 14px; width:100%; outline:none; transition:border-color .2s; -webkit-appearance:none; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--accent); }
    .field textarea { resize:none; height:100px; }
    .field select option { background:#1a1a1a; }

    /* ── BADGES ── */
    .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
    .badge-endurance { background:rgba(198,255,62,.12); color:var(--accent); }
    .badge-team { background:rgba(61,158,255,.12); color:var(--blue); }
    .badge-general { background:rgba(255,94,31,.12); color:var(--orange); }

    /* ── TYPE COLORS ── */
    .tc-run { color:var(--accent); } .tc-strength { color:var(--orange); } .tc-cross { color:var(--blue); }
    .tc-skills { color:var(--purple); } .tc-rest { color:var(--text-dim); } .tc-conditioning { color:#FF3B6E; }
    .dot-run { background:var(--accent); } .dot-strength { background:var(--orange); } .dot-cross { background:var(--blue); }
    .dot-skills { background:var(--purple); } .dot-rest { background:var(--text-dim); } .dot-conditioning { background:#FF3B6E; }

    /* ── LAYOUT UTILS ── */
    .page { padding:0 16px 28px; }
    @media(min-width:768px){ .page { padding:0 32px 40px; } }
    .sec-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin:22px 0 10px; }
    .divider { height:1px; background:var(--border); margin:14px 0; }
    .row { display:flex; align-items:center; }
    .between { justify-content:space-between; }
    .gap-2 { gap:8px; } .gap-3 { gap:12px; } .gap-4 { gap:16px; }
    .mt-2 { margin-top:8px; } .mt-3 { margin-top:12px; } .mt-4 { margin-top:16px; }
    .text-muted { color:var(--text-muted); } .text-sm { font-size:13px; } .text-xs { font-size:11px; }
    .fw-bold { font-weight:700; } .w-full { width:100%; }

    /* ── WEEK GRID ── */
    .week-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    @media(min-width:768px){ .week-grid { grid-template-columns:repeat(6,1fr); } }
    .wk-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-sm); padding:14px 8px; text-align:center; cursor:pointer; transition:all .18s; }
    .wk-card:hover { border-color:rgba(255,255,255,.15); }
    .wk-card.active { border-color:var(--accent); background:var(--accent-dim); }
    .wk-num { font-family:var(--display); font-size:26px; line-height:1; }
    .wk-theme { font-size:10px; color:var(--text-muted); margin-top:2px; line-height:1.2; }

    /* ── PROGRESS BAR ── */
    .prog-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:8px; }
    .prog-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .5s ease; }
    .prog-bar.thick { height:6px; margin:0; }

    /* ── DAY ROWS ── */
    .day-row { display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--border); cursor:pointer; }
    .day-row:last-child { border-bottom:none; } .day-row:hover .day-check:not(.done) { border-color:rgba(198,255,62,.4); }
    .day-lbl { font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; width:34px; flex-shrink:0; }
    .day-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .day-info { flex:1; min-width:0; }
    .day-name { font-size:15px; font-weight:600; }
    .day-detail { font-size:12px; color:var(--text-muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .day-check { width:26px; height:26px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .18s; }
    .day-check.done { background:var(--accent); border-color:var(--accent); }

    /* ── HERO ── */
    .hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; top:-120px; left:-80px; width:420px; height:420px; background:radial-gradient(circle,rgba(198,255,62,.07) 0%,transparent 70%); pointer-events:none; }
    .hero::after { content:''; position:absolute; bottom:-60px; right:-80px; width:320px; height:320px; background:radial-gradient(circle,rgba(255,94,31,.05) 0%,transparent 70%); pointer-events:none; }
    .hero-logo { font-family:var(--display); font-size:80px; letter-spacing:5px; line-height:1; margin-bottom:6px; }
    .hero-logo em { color:var(--accent); font-style:normal; }
    .hero-tag { color:var(--text-muted); font-size:14px; letter-spacing:.5px; margin-bottom:52px; }
    .hero-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }

    /* ── STAT GRID ── */
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
    .stat-val { font-family:var(--display); font-size:38px; color:var(--accent); line-height:1; }
    .stat-lbl { font-size:12px; color:var(--text-muted); margin-top:3px; }

    /* ── TODAY CARD ── */
    .today-card { background:linear-gradient(135deg,rgba(198,255,62,.09) 0%,rgba(198,255,62,.02) 100%); border:1px solid rgba(198,255,62,.18); border-radius:var(--r); padding:22px; margin-bottom:4px; }
    .today-tag { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; color:var(--accent); margin-bottom:5px; }
    .today-title { font-family:var(--display); font-size:36px; letter-spacing:1px; line-height:1.05; margin-bottom:10px; }
    .today-detail { font-size:13px; color:var(--text-muted); line-height:1.6; }

    /* ── ACCESS CODE ── */
    .access-code { font-family:monospace; font-size:20px; letter-spacing:4px; color:var(--accent); background:var(--accent-dim); padding:8px 18px; border-radius:var(--r-sm); display:inline-block; border:1px solid rgba(198,255,62,.2); }

    /* ── EMPTY STATE ── */
    .empty { text-align:center; padding:56px 24px; }
    .empty-icon { font-size:52px; margin-bottom:14px; }
    .empty-title { font-size:20px; font-weight:700; margin-bottom:6px; }

    /* ── TOAST ── */
    .toast { position:fixed; bottom:calc(var(--nav) + 16px); left:50%; transform:translateX(-50%); background:var(--text); color:#000; padding:12px 22px; border-radius:99px; font-size:14px; font-weight:700; z-index:500; white-space:nowrap; animation:toastIn .3s ease; pointer-events:none; }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @media(min-width:768px){ .toast { bottom:24px; } }

    /* ── CHECK-IN UNREAD DOT ── */
    .unread-dot { width:8px; height:8px; border-radius:50%; background:var(--orange); flex-shrink:0; }
  </style>
</head>

// ── HELPERS ───────────────────────────────────────────
function unreadCount() { return S.clients.reduce((n,c) => n + c.checkIns.filter(ci=>!ci.read).length, 0); }
function typeBadge(t) { const m={endurance:'badge-endurance endurance',team:'badge-team team',general:'badge-general general'}; const l={endurance:'🏃 Endurance',team:'⚽ Team Sport',general:'💪 General Fitness'}; return `<span class="badge ${m[t]||'badge-general'}">${l[t]||t}</span>`; }
function typeLabel(t) { const m={endurance:'🏃 Endurance',team:'⚽ Team Sport',general:'💪 General Fitness'}; return m[t]||t; }
function pctDone(program) { const done=program.reduce((n,w)=>n+w.days.filter(d=>d.completed).length,0); return Math.round((done/42)*100); }
function weekPct(week) { return Math.round((week.days.filter(d=>d.completed).length/7)*100); }

function dayRow(day, di, wi, clientMode, weekNum) {
  const tc={run:'dot-run',strength:'dot-strength',cross:'dot-cross',skills:'dot-skills',rest:'dot-rest',conditioning:'dot-conditioning'};
  const action = clientMode ? `data-a="toggle" data-w="${wi}" data-d="${di}"` : '';
  return `<div class="day-row" ${action}>
    <div class="day-lbl">${day.day}</div>
    <div class="day-dot ${tc[day.type]||'dot-rest'}"></div>
    <div class="day-info">
      <div class="day-name">${day.workout}</div>
      <div class="day-detail">${day.details}</div>
    </div>
    ${clientMode ? `<div class="day-check ${day.completed?'done':''}">
      ${day.completed?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}
    </div>` : ''}
  </div>`;
}

function weekDetailBlock(program, wi, clientMode) {
  if (wi === null || wi === undefined || !program[wi]) return '';
  const w = program[wi];
  return `<div class="card" style="margin-top:10px">
    <div style="font-family:var(--display);font-size:22px;letter-spacing:1px;margin-bottom:4px">WEEK ${w.week} — <span style="color:var(--accent)">${w.theme.toUpperCase()}</span></div>
    <div style="height:1px;background:var(--border);margin:10px 0"></div>
    ${w.days.map((day,di) => dayRow(day, di, wi, clientMode, w.week)).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════
//  EVENT DISPATCH
// ══════════════════════════════════════════════════════
function dispatch(e) {
  const a = e.currentTarget.dataset.a;
  if (!a) return;
  e.stopPropagation();

  switch(a) {
    case 'go-home': S.view='home'; break;
    case 'go-disclaimer': S.view='disclaimer'; break;
    case 'go-coach-login': S.view='coach-login'; break;
    case 'go-client-login': S.view='client-login'; break;
    case 'go-add': S.view='coach-add'; break;
    case 'go-build': S.week=S.week??0; S.view='coach-build'; break;
    case 'nav-clients': S.tab='clients'; S.view='coach-dash'; S.client=null; break;
    case 'nav-msgs': S.tab='msgs'; S.view='coach-dash'; break;
    case 'logout': S.coachAuth=false; S.view='home'; S.client=null; break;
    case 'back-dash': S.view='coach-dash'; S.client=null; break;
    case 'back-client': S.view='coach-client'; break;

    case 'coach-auth': {
      const pw = document.getElementById('cpw').value;
      if (pw===COACH_PASSWORD) { S.coachAuth=true; S.tab='clients'; S.view='coach-dash'; }
      else document.getElementById('cpw-err').style.display='block';
      break;
    }
    case 'view-client': {
      const id = e.currentTarget.dataset.id;
      S.client = S.clients.find(c=>c.id===id);
      S.week = 0; S.view='coach-client';
      break;
    }
    case 'sel-week': {
      const w = parseInt(e.currentTarget.dataset.w);
      S.week = S.week===w ? null : w;
      break;
    }
    case 'save-week': {
      const c = S.client; const w = c.program[S.week];
      w.theme = document.getElementById('wtheme').value;
      document.querySelectorAll('.d-name').forEach(el => w.days[el.dataset.d].workout=el.value);
      document.querySelectorAll('.d-detail').forEach(el => w.days[el.dataset.d].details=el.value);
      document.querySelectorAll('.d-type').forEach(el => w.days[el.dataset.d].type=el.value);
      toast('Week saved! ✓');
      if (S.week<5) S.week++; else S.view='coach-client';
      break;
    }
    case 'prev-wk': S.week=Math.max(0,S.week-1); break;
    case 'next-wk': S.week=Math.min(5,S.week+1); break;
    case 'create-client': {
      const name=document.getElementById('nn').value.trim();
      const goal=document.getElementById('ng').value.trim();
      const type=document.getElementById('nt').value;
      const code=document.getElementById('nc').value.trim().toUpperCase();
      if(!name||!goal||!code){toast('Please fill all fields ⚠️');return;}
      const nc={id:'c'+Date.now(),name,type,goal,code,start:new Date().toISOString().split('T')[0],checkIns:[],program:buildProgram(type)};
      S.clients.push(nc); S.client=nc; S.week=0; S.view='coach-client';
      toast('Athlete created! 🚀');
      break;
    }
    case 'del-client': {
      if(confirm('Remove this athlete? This cannot be undone.')) {
        S.clients=S.clients.filter(c=>c.id!==e.currentTarget.dataset.id);
        S.client=null; S.view='coach-dash';
      }
      break;
    }
    case 'mark-read': {
      const c=S.clients.find(c=>c.id===e.currentTarget.dataset.cid);
      if(c){const ci=c.checkIns.find(ci=>ci.id===e.currentTarget.dataset.ciid);if(ci)ci.read=true;}
      break;
    }
    case 'client-auth': {
      const name=document.getElementById('cln').value.trim().toLowerCase();
      const code=document.getElementById('clc').value.trim().toUpperCase();
      const c=S.clients.find(c=>c.code===code&&c.name.toLowerCase().startsWith(name));
      if(c){S.client=c;S.week=0;S.view='client-portal';}
      else document.getElementById('cl-err').style.display='block';
      break;
    }
    case 'client-home': S.view='client-portal'; break;
    case 'client-ci': S.view='client-checkin'; break;
    case 'client-logout': S.client=null; S.view='home'; break;
    case 'cl-sel-week': {
      const w=parseInt(e.currentTarget.dataset.w);
      S.week=S.week===w?null:w;
      break;
    }
    case 'toggle': {
      const w=parseInt(e.currentTarget.dataset.w), d=parseInt(e.currentTarget.dataset.d);
      if(isNaN(w)||isNaN(d)) break;
      S.client.program[w].days[d].completed=!S.client.program[w].days[d].completed;
      if(S.client.program[w].days[d].completed) toast('Workout logged! 💪');
      break;
    }
    case 'send-ci': {
      const msg=document.getElementById('ci-msg').value.trim();
      if(!msg){toast('Write your message first ⚠️');return;}
      S.client.checkIns.push({id:'ci'+Date.now(),date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),msg,read:false});
      toast('Check-in sent to your coach! ✓');
      S.view='client-portal';
      break;
    }
  }
  render();
}

// ── TOAST ─────────────────────────────────────────────
function toast(msg) {
  document.querySelector('.toast')?.remove();
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}

// ── INIT ──────────────────────────────────────────────
render();
</script>
</body>
