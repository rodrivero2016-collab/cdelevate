<style>

.udt{width:8px;height:8px;border-radius:50%;background:var(--org);flex-shrink:0}

.plc{display:grid;grid-template-columns:1fr 1fr;gap:8px}

function buildHybrid(){

    return{week:w,theme:TH[i],days:[
      mkDay('Mon',`Chest & Arms + Bike`,`Bench Press ${w<=3?3:w<=6?4:5}×${w<=3?10:w<=6?8:6} | DB Fly, Curl, Tricep Ext 3×12 | Bike ${bike} min.`,'strength'),

      mkDay('Thu','Tempo / Track Run',`5 min warmup → ${trun} min ${w<=3?'threshold effort':'tempo or intervals'} → 5 min cooldown.`,'run'),
      mkDay('Fri','Legs',`Squat ${w<=3?'3×10':w<=6?'4×8':w<=9?'5×5':'5×5 max'} | Deadlift ${w<=3?'3×12':w<=6?'4×6':'5×5'} | Lunge 3×12 | Calf Raise 4×20.`,'strength'),

}

function pgCoachBuild(){
  const c=S.client;if(!c) return '';
  const w=c.program[S.week];
  return `<div class="hdr"><div class="hback" data-a="bcl">← ${c.name.split(' ')[0]}</div><div class="htitle" style="font-size:20px">WEEK ${S.week+1} EDITOR</div></div>
  <div class="pg" style="padding-top:14px">
    <div class="fld"><label>Week Theme</label><input type="text" id="wth" value="${w.theme}"></div>
    ${w.days.map((d,di)=>`<div class="crd" style="margin-bottom:10px"><div style="font-weight:800;color:var(--acc);font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">${d.day}</div><div class="fld" style="margin-bottom:10px"><label>Workout</label><input type="text" class="dn2" data-d="${di}" value="${d.workout}"></div><div class="fld" style="margin-bottom:10px"><label>Details</label><textarea class="dd3" data-d="${di}" style="height:60px">${d.details}</textarea></div><div class="fld" style="margin-bottom:0"><label>Type</label><select class="dt" data-d="${di}">${['run','strength','cross','skills','conditioning','rest'].map(t=>`<option value="${t}" ${d.type===t?'selected':''}>${t[0].toUpperCase()+t.slice(1)}</option>`).join('')}</select></div></div>`).join('')}
    <button class="btn bpri" data-a="savwk" style="margin-top:6px">Save Week ${S.week+1} ✓</button>
    <div style="display:flex;gap:10px;margin-top:10px">
      ${S.week>0?`<button class="btn bsec" data-a="prvwk">← Week ${S.week}</button>`:''}
      ${S.week<c.program.length-1?`<button class="btn bsec" data-a="nxtwk">Week ${S.week+2} →</button>`:''}
    </div>
  </div>`;
}

function pgCoachAdd(){
  const rc=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');};
  return `<div class="hdr"><div class="hback" data-a="bdash">← Dashboard</div><div class="htitle" style="font-size:22px">NEW CLIENT</div></div>
  <div class="pg" style="padding-top:18px">
    <div class="fld"><label>Athlete Name</label><input type="text" id="nn" placeholder="e.g. Jordan Smith"></div>
    <div class="fld"><label>Goal</label><input type="text" id="ng" placeholder="e.g. Run a 5K under 25 min"></div>
    <div class="fld"><label>Program Type</label>
      <select id="nt" onchange="document.getElementById('hn').style.display=this.value==='hybrid'?'block':'none'">
        <option value="endurance">🏃 Endurance — 6 weeks</option>
        <option value="team">⚽ Team Sport — 6 weeks</option>
        <option value="general">💪 General Fitness — 6 weeks</option>
        <option value="hybrid">⚡ Hybrid Athlete — 12 weeks</option>
      </select>
    </div>
    <div id="hn" style="display:none;background:rgba(176,77,255,.08);border:1px solid rgba(176,77,255,.2);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#bbb;margin-bottom:16px">⚡ <strong style="color:var(--pur)">12-Week Hybrid Split:</strong> Mon (Chest+Arms+Bike) · Tue (Easy Run) · Wed (Back+Shoulders) · Thu (Tempo Run) · Fri (Legs) · Sat (Shoulders+Arms) · Sun (Jump Rope/Swim+Recovery)</div>
    <div class="fld"><label>Access Code</label><input type="text" id="nc" value="${rc()}" style="text-transform:uppercase;letter-spacing:2px;font-family:monospace;font-size:16px"></div>
    <button class="btn bpri" data-a="mkcl" style="margin-top:8px">Create Athlete + Generate Program 🚀</button>
    <button class="btn bsec" data-a="bdash" style="margin-top:10px">Cancel</button>
  </div>`;
}

function pgClientLogin(){
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px">
    <div style="width:100%;max-width:360px">
      <div style="text-align:center;margin-bottom:34px"><div style="font-family:var(--dis);font-size:60px;letter-spacing:3px">CD<span style="color:var(--acc)">ELEVATE</span></div><div style="color:var(--mut);font-size:14px;margin-top:6px">📍 Austin, Texas · Access your program</div></div>
      <div class="fld"><label>Your First Name</label><input type="text" id="cln" placeholder="e.g. Marcus"></div>
      <div class="fld"><label>Access Code</label><input type="text" id="clc" placeholder="e.g. MARCUS1" style="text-transform:uppercase;letter-spacing:2px;font-family:monospace;font-size:16px"></div>
      <div style="color:var(--red);font-size:13px;margin-bottom:12px;display:none" id="clerr">Name or code not found. Check with your coach.</div>
      <button class="btn bpri" data-a="clauth" style="margin-top:6px">Access My Program →</button>
      <button class="btn bsec" data-a="go-home" style="margin-top:10px">← Back</button>
      <div style="margin-top:34px;padding:14px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;color:var(--mut)"><strong style="color:var(--txt)">Demo:</strong> Name: <span style="color:var(--acc)">Marcus</span> · Code: <span style="color:var(--acc)">MARCUS1</span></div>
    </div>
  </div>`;
}

function pgClientPortal(){
  const c=S.client;if(!c) return '';
  let nx=null,nw=0,nd=0;
  outer:for(let w=0;w<c.program.length;w++)for(let d=0;d<c.program[w].days.length;d++)if(!c.program[w].days[d].completed){nx=c.program[w].days[d];nw=w;nd=d;break outer;}
  const p=pct(c.program);const fn=c.name.split(' ')[0];
  return `<div class="hdr"><div style="font-family:var(--dis);font-size:26px;letter-spacing:1px">CD<span style="color:var(--acc)">ELEVATE</span></div><div style="font-size:13px;color:var(--mut)">Hi, ${fn} 👋</div></div>
  <div class="pg" style="padding-top:14px">
    ${nx?`<div class="tc"><div class="tt">⚡ Up Next</div><div class="tti">${nx.workout}</div><div class="td">${nx.details}</div><button class="btn bpri" style="max-width:200px;margin-top:16px;height:44px" data-a="tog" data-w="${nw}" data-d="${nd}">✓ &nbsp;Mark Complete</button></div>`
    :`<div class="tc"><div class="tt">🏆 ALL DONE!</div><div class="tti">PROGRAM COMPLETE</div><div class="td">Incredible work, ${fn}. Talk to your coach about your next block!</div></div>`}
    <div class="row btw" style="margin-top:20px;margin-bottom:6px;align-items:center"><div class="sl" style="margin:0">OVERALL PROGRESS</div><div style="font-family:var(--dis);font-size:22px;color:var(--acc)">${p}%</div></div>
    <div class="pb tk" style="margin-bottom:18px"><div class="pf" style="width:${p}%"></div></div>
    <div class="sl">${c.program.length}-WEEK OVERVIEW</div>
    <div class="wg">${c.program.map((w,i)=>`<div class="wc ${S.week===i?'on':''}" data-a="cswk" data-w="${i}"><div class="wn">${i+1}</div><div class="wt">${w.theme}</div><div class="pb"><div class="pf" style="width:${wpct(w)}%"></div></div><div style="font-size:10px;color:var(--mut);margin-top:4px">${w.days.filter(d=>d.completed).length}/7</div></div>`).join('')}</div>
    ${wkBlock(c.program,S.week,true)}
  </div>`;
}

function pgClientCI(){
  const c=S.client;if(!c) return '';
  return `<div class="hdr"><div class="htitle">CHECK-IN</div></div>
  <div class="pg" style="padding-top:14px">
    <div class="crd" style="margin-bottom:16px;background:var(--adim);border-color:rgba(198,255,62,.15)"><div style="font-size:13px;color:var(--mut);line-height:1.65">Send Christian a message about how training is going. Wins, soreness, questions — anything! 💬</div></div>
    <div class="fld"><label>Your Message</label><textarea id="cimsg" style="height:160px" placeholder="e.g. Week 2 felt tough but I pushed through all 7 days!"></textarea></div>
    <button class="btn bpri" data-a="sendci">Send Check-in →</button>
    ${c.checkIns.length>0?`<div class="sl" style="margin-top:22px">PREVIOUS MESSAGES</div>${[...c.checkIns].reverse().map(ci=>`<div class="crd" style="margin-bottom:8px"><div style="font-size:11px;color:var(--mut);margin-bottom:5px">${ci.date}</div><div style="font-size:14px;font-style:italic;color:var(--mut)">"${ci.msg}"</div></div>`).join('')}`:''}
  </div>`;
}

function act(e){
  const a=e.currentTarget.dataset.a;if(!a) return;
  e.stopPropagation();
  switch(a){
    case 'go-home': S.view='home'; break;
    case 'go-coach': S.view='coach-login'; break;
    case 'go-client': S.view='cl-login'; break;
    case 'go-add': S.view='coach-add'; break;
    case 'go-build': S.week=S.week??0; S.view='coach-build'; break;
    case 'go-faq': S.view='faq'; S.faq=null; break;
    case 'go-pol': S.view='policies'; break;
    case 'go-dis': S.view='disclaimer'; break;
    case 'go-ref': S.view='ref'; break;
    case 'nav-cl': S.tab='cl'; S.view='coach-dash'; S.client=null; break;
    case 'nav-msg': S.tab='msg'; S.view='coach-dash'; break;
    case 'logout': S.auth=false; S.view='home'; S.client=null; break;
    case 'bdash': S.view='coach-dash'; S.client=null; break;
    case 'bcl': S.view='coach-cl'; break;
    case 'cl-home': S.view='cl-portal'; break;
    case 'cl-ci': S.view='cl-ci'; break;
    case 'cl-out': S.client=null; S.view='home'; break;
    case 'scr': {
      render();
      const el=document.getElementById(e.currentTarget.dataset.s);
      if(el) setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),50);
      return;
    }
    case 'setq': {
      qi=parseInt(e.currentTarget.dataset.q);
      const tx=document.getElementById('qtx'),au=document.getElementById('qau');
      if(tx&&au){tx.style.opacity='0';setTimeout(()=>{tx.textContent=QQ[qi].t;au.textContent='— '+QQ[qi].a;tx.style.opacity='1';document.querySelectorAll('.qd').forEach((d,i)=>d.classList.toggle('on',i===qi));},300);}
      return;
    }
    case 'faq': {
      const i=parseInt(e.currentTarget.dataset.i);S.faq=S.faq===i?null:i; break;
    }
    case 'cauth': {
      const pw=document.getElementById('cpw').value;
      if(pw===PW){S.auth=true;S.tab='cl';S.view='coach-dash';}
      else document.getElementById('perr').style.display='block';
      break;
    }
    case 'vcl': {
      S.client=S.clients.find(c=>c.id===e.currentTarget.dataset.id);
      S.week=0;S.view='coach-cl'; break;
    }
    case 'swk': {const w=parseInt(e.currentTarget.dataset.w);S.week=S.week===w?null:w; break;}
    case 'savwk': {
      const c=S.client;const w=c.program[S.week];
      w.theme=document.getElementById('wth').value;
      document.querySelectorAll('.dn2').forEach(el=>w.days[el.dataset.d].workout=el.value);
      document.querySelectorAll('.dd3').forEach(el=>w.days[el.dataset.d].details=el.value);
      document.querySelectorAll('.dt').forEach(el=>w.days[el.dataset.d].type=el.value);
      toast('Week saved! ✓');
      if(S.week<c.program.length-1) S.week++; else S.view='coach-cl';
      break;
    }
    case 'prvwk': S.week=Math.max(0,S.week-1); break;
    case 'nxtwk': S.week=Math.min(S.client.program.length-1,S.week+1); break;
    case 'mkcl': {
      const name=document.getElementById('nn').value.trim();
      const goal=document.getElementById('ng').value.trim();
      const type=document.getElementById('nt').value;
      const code=document.getElementById('nc').value.trim().toUpperCase();
      if(!name||!goal||!code){toast('Please fill all fields ⚠️');return;}
      const prog=type==='hybrid'?buildHybrid():buildProgram(type);
      S.clients.push({id:'c'+Date.now(),name,type,goal,code,start:new Date().toISOString().split('T')[0],checkIns:[],program:prog});
      S.client=S.clients[S.clients.length-1];S.week=0;S.view='coach-cl';
      toast('Athlete created! 🚀'); break;
    }
    case 'delcl': {
      if(confirm('Remove this athlete?')){S.clients=S.clients.filter(c=>c.id!==e.currentTarget.dataset.id);S.client=null;S.view='coach-dash';} break;
    }
    case 'mread': {
      const c=S.clients.find(c=>c.id===e.currentTarget.dataset.cid);
      if(c){const ci=c.checkIns.find(ci=>ci.id===e.currentTarget.dataset.ciid);if(ci)ci.read=true;} break;
    }
    case 'clauth': {
      const name=document.getElementById('cln').value.trim().toLowerCase();
      const code=document.getElementById('clc').value.trim().toUpperCase();
      const c=S.clients.find(c=>c.code===code&&c.name.toLowerCase().startsWith(name));
      if(c){S.client=c;S.week=0;S.view='cl-portal';}
      else document.getElementById('clerr').style.display='block';
      break;
    }
    case 'cswk': {const w=parseInt(e.currentTarget.dataset.w);S.week=S.week===w?null:w; break;}
    case 'tog': {
      const w=parseInt(e.currentTarget.dataset.w),d=parseInt(e.currentTarget.dataset.d);
      if(isNaN(w)||isNaN(d)) break;
      S.client.program[w].days[d].completed=!S.client.program[w].days[d].completed;
      if(S.client.program[w].days[d].completed) toast('Workout logged! 💪');
      break;
    }
    case 'sendci': {
      const msg=document.getElementById('cimsg').value.trim();
      if(!msg){toast('Write your message first ⚠️');return;}
      S.client.checkIns.push({id:'ci'+Date.now(),date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),msg,read:false});
      toast('Check-in sent! ✓');S.view='cl-portal'; break;
    }
  }
  render();
}

function toast(msg){
  document.querySelector('.tst')?.remove();
  const t=document.createElement('div');t.className='tst';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);
}

render();
</script>
</body>
</html>
